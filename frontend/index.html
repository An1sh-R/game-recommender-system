<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Recommender</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-soft: #1f2937;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --danger: #f87171;
      --success: #4ade80;
      --card: #0b1220;
      --border: #334155;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(circle at top, #172554 0%, var(--bg) 45%);
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      width: min(1100px, 92vw);
      margin: 24px auto 40px;
    }

    .title {
      font-size: 2rem;
      font-weight: 700;
      margin: 0 0 8px;
    }

    .subtitle {
      color: var(--muted);
      margin: 0 0 20px;
    }

    .panel {
      background: rgba(17, 24, 39, 0.9);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
      backdrop-filter: blur(4px);
    }

    .section-title {
      margin: 0 0 12px;
      font-size: 1.05rem;
      font-weight: 600;
    }

    .row {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 10px;
      align-items: center;
    }

    .col-4 { grid-column: span 4; }
    .col-6 { grid-column: span 6; }
    .col-12 { grid-column: span 12; }

    input[type="text"],
    input[type="password"],
    select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--panel-soft);
      color: var(--text);
      outline: none;
    }

    input::placeholder { color: #64748b; }

    button {
      border: 1px solid transparent;
      background: #0369a1;
      color: #fff;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 600;
      transition: transform .12s ease, opacity .12s ease, background .2s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-secondary { background: #374151; }

    .status {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .status.error { color: var(--danger); }
    .status.success { color: var(--success); }

    .modes {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .mode-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 12px;
      background: #0b1220;
      cursor: pointer;
      user-select: none;
    }
    .mode-chip input { margin: 0; }

    .quiz-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    #quizGridContainer { display: none; }
    body.mode-quiz #quizGridContainer,
    body.mode-hybrid #quizGridContainer { display: block; }

    .quiz-item {
      background: var(--card);
      border: 1px solid #223047;
      border-radius: 12px;
      padding: 10px;
    }

    .quiz-item label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.92rem;
      color: #cbd5e1;
    }

    .slider-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .slider-value {
      width: 28px;
      text-align: right;
      color: #7dd3fc;
      font-weight: 700;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
      margin-top: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid #243247;
      border-radius: 14px;
      overflow: hidden;
      transition: transform .18s ease, box-shadow .18s ease, border-color .2s ease;
    }

    .card:hover {
      transform: scale(1.02);
      border-color: #3b82f6;
      box-shadow: 0 12px 26px rgba(2, 6, 23, 0.45);
    }

    .thumb-link { display: block; line-height: 0; }

    .thumb {
      width: 100%;
      height: 150px;
      object-fit: cover;
      display: block;
      background: #0b1220;
    }

    .card-body { padding: 12px; }
    .name {
      margin: 0 0 8px;
      font-size: 1rem;
      line-height: 1.3;
    }

    .tags {
      color: #93c5fd;
      font-size: 0.86rem;
      margin: 0 0 10px;
      min-height: 20px;
    }

    .scores {
      display: grid;
      gap: 4px;
      font-size: 0.86rem;
      color: #cbd5e1;
    }

    .meta {
      color: #64748b;
      font-size: 0.8rem;
      margin-top: 6px;
    }

    .hidden { display: none; }
    .loader {
      border: 4px solid #1f2937;
      border-top: 4px solid #38bdf8;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 16px auto;
    }

@keyframes spin {
  to { transform: rotate(360deg); }
}

    @media (max-width: 800px) {
      .col-4, .col-6 { grid-column: span 12; }
      .quiz-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1 class="title">Game Discovery</h1>
    <p class="subtitle">Personalized Steam recommendations powered by your taste profile.</p>

    <section class="panel">
      <h2 class="section-title">Account</h2>
      <div class="row">
        <div class="col-4"><input id="username" type="text" placeholder="Username" /></div>
        <div class="col-4"><input id="password" type="password" placeholder="Password" /></div>
        <div class="col-4 actions">
          <button id="loginBtn">Login</button>
          <button id="registerBtn" class="btn-secondary">Register</button>
          <button id="logoutBtn" class="btn-secondary hidden">Logout</button>
        </div>
        <div class="col-12">
          <div id="authStatus" class="status">Not logged in.</div>
        </div>
      </div>
    </section>

    <section class="panel">
      <h2 class="section-title">Mode</h2>
      <div class="modes">
        <label class="mode-chip"><input type="radio" name="mode" value="game" checked /> Game-based</label>
        <label class="mode-chip"><input type="radio" name="mode" value="quiz" /> Quiz-based</label>
        <label class="mode-chip"><input type="radio" name="mode" value="hybrid" /> Hybrid</label>
      </div>
    </section>

    <section class="panel">
      <h2 class="section-title">Game Input</h2>
      <div class="row">
        <div class="col-12">
          <input id="gameInput" type="text" placeholder="Enter game(s), e.g. witcher 3, elden ring" />
        </div>
      </div>
    </section>

    <div id="quizGridContainer">
      <section class="panel">
        <h2 class="section-title">Quiz (10 Questions)</h2>
        <div id="quizGrid" class="quiz-grid"></div>
      </section>
    </div>

    <section class="panel">
      <h2 class="section-title">Get Recommendations</h2>
      <div class="actions">
        <button id="submitBtn">Find Games</button>
      </div>
      <div id="requestStatus" class="status"></div>
      <div id="results" class="results"></div>
    </section>
  </main>

  <script>
    const API_BASE = window.location.hostname === "localhost" ? "http://localhost:8000" : "https://game-recommender-system-k9qi.onrender.com";

    const quizQuestions = [
      "I enjoy exploring large worlds and hidden areas.",
      "A strong story is important in the games I play.",
      "I like games that challenge my skills.",
      "I enjoy planning, optimizing, and strategic thinking.",
      "I like games with social or cooperative experiences.",
      "I prefer games that help me relax and unwind.",
      "I enjoy chill exploration more than fast pacing.",
      "I connect with characters and emotional narratives.",
      "I like tactical decision-making under pressure.",
      "I enjoy mastering difficult systems over time."
    ];

    const authStatus = document.getElementById("authStatus");
    const requestStatus = document.getElementById("requestStatus");
    const usernameInput = document.getElementById("username");
    const passwordInput = document.getElementById("password");
    const gameInput = document.getElementById("gameInput");
    const quizGrid = document.getElementById("quizGrid");
    const resultsEl = document.getElementById("results");
    const logoutBtn = document.getElementById("logoutBtn");

    function setStatus(el, message, type = "") {
      el.textContent = message;
      el.className = "status" + (type ? " " + type : "");
    }

    function getLoggedInUser() {
      const user_id = localStorage.getItem("user_id");
      const username = localStorage.getItem("username");
      if (!user_id || !username) return null;
      return { user_id: Number(user_id), username };
    }

    function setLoggedInUser(user_id, username) {
      localStorage.setItem("user_id", String(user_id));
      localStorage.setItem("username", username);
      refreshAuthUI();
    }

    function clearLoggedInUser() {
      localStorage.removeItem("user_id");
      localStorage.removeItem("username");
      refreshAuthUI();
    }

    function refreshAuthUI() {
      const user = getLoggedInUser();
      if (user) {
        setStatus(authStatus, `Logged in as ${user.username}`, "success");
        logoutBtn.classList.remove("hidden");
      } else {
        setStatus(authStatus, "Not logged in.");
        logoutBtn.classList.add("hidden");
      }
    }

    function buildQuizUI() {
      quizGrid.innerHTML = "";
      quizQuestions.forEach((text, idx) => {
        const item = document.createElement("div");
        item.className = "quiz-item";
        item.innerHTML = `
          <label for="q${idx}">${idx + 1}. ${text}</label>
          <div class="slider-wrap">
            <input id="q${idx}" type="range" min="1" max="5" step="1" value="3" />
            <span id="qv${idx}" class="slider-value">3</span>
          </div>
        `;
        quizGrid.appendChild(item);
        const slider = item.querySelector(`#q${idx}`);
        const value = item.querySelector(`#qv${idx}`);
        slider.addEventListener("input", () => value.textContent = slider.value);
      });
    }

    function getQuizAnswers() {
      const answers = [];
      for (let i = 0; i < 10; i++) {
        answers.push(Number(document.getElementById(`q${i}`).value));
      }
      return answers;
    }

    function selectedMode() {
      return document.querySelector('input[name="mode"]:checked').value;
    }

    function applyModeClass(mode) {
      document.body.classList.remove("mode-game", "mode-quiz", "mode-hybrid");
      document.body.classList.add(`mode-${mode}`);
    }

    function safeNumber(value) {
      if (value === null || value === undefined || Number.isNaN(Number(value))) return null;
      return Number(value);
    }

    function fmtScore(value) {
      const num = safeNumber(value);
      return num === null ? "N/A" : num.toFixed(3);
    }

    function normalizeTags(tags) {
      if (Array.isArray(tags)) return tags.join(", ");
      if (typeof tags === "string") return tags;
      return "No tags";
    }

    function renderResults(games) {
      resultsEl.innerHTML = "";
      if (!games || games.length === 0) {
        setStatus(requestStatus, "No results found.", "error");
        return;
      }

      games.forEach((game) => {
        const appId = game.AppID ?? game.appid ?? game.app_id ?? game.id;
        const imageUrl = appId
          ? `https://cdn.akamai.steamstatic.com/steam/apps/${appId}/header.jpg`
          : "https://placehold.co/460x215?text=Image+Not+Available";
        const steamUrl = appId
          ? `https://store.steampowered.com/app/${appId}`
          : "#";

        const card = document.createElement("article");
        card.className = "card";
        card.innerHTML = `
          <a class="thumb-link" href="${steamUrl}" target="_blank" rel="noopener noreferrer">
            <img
              class="thumb"
              src="${imageUrl}"
              alt="${(game.Name || "Game")} banner"
              onerror="this.src='https://placehold.co/460x215?text=Image+Not+Available'"
            />
          </a>
          <div class="card-body">
            <h3 class="name">${game.Name || "Unknown Game"}</h3>
            <p class="tags">${normalizeTags(game.Tags)}</p>
            <div class="scores">
              ${game.hybrid_score !== undefined ? `<div style="color:var(--accent)">Match Score: ${fmtScore(game.hybrid_score)}</div>` : ""}
              ${game.similarity_score !== undefined ? `<div>Similarity: ${fmtScore(game.similarity_score)}</div>` : ""}
              <div>Player Match: ${fmtScore(game.player_match)}</div>
              <div>Popularity: ${fmtScore(game.popularity)}</div>
            </div>
            <div class="meta">${appId ? `AppID: ${appId}` : "AppID unavailable"}</div>
          </div>
        `;
        resultsEl.appendChild(card);
      });
    }

    async function apiPost(path, payload) {
      const res = await fetch(`${API_BASE}${path}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        const message = data.detail || `Request failed (${res.status})`;
        throw new Error(message);
      }
      return data;
    }

    async function handleAuth(action) {
      const username = usernameInput.value.trim();
      const password = passwordInput.value;

      if (!username || !password) {
        setStatus(authStatus, "Username and password are required.", "error");
        return;
      }

      try {
        setStatus(authStatus, `${action === "login" ? "Logging in" : "Registering"}...`);
        const path = action === "login" ? "/auth/login" : "/auth/register";
        const data = await apiPost(path, { username, password });
        setLoggedInUser(data.user_id, username);
        setStatus(authStatus, `${data.message} Logged in as ${username}.`, "success");
      } catch (err) {
        setStatus(authStatus, err.message || "Authentication failed.", "error");
      }
    }

    function parseGamesInput(raw) {
      return raw
        .split(",")
        .map(x => x.trim())
        .filter(Boolean);
    }

    async function submitRecommendations() {
      resultsEl.innerHTML = "";
      const mode = selectedMode();
      const user = getLoggedInUser();
      const quiz_answers = getQuizAnswers();

      try {
        requestStatus.innerHTML = `<div style="text-align:center;">
            <div class="loader"></div>
            <p>🚀 Fetching recommendations...</p>
            <p style="color:#94a3b8; font-size:0.9rem;">
              First request may take ~60 seconds (server waking up)
            </p>
          </div>`;

        setTimeout(() => {
          requestStatus.innerHTML += `<p style="color:#facc15; font-size:0.85rem;">
              Still working... almost there 👀
            </p>`;
        }, 10000);

        if (mode === "quiz") {
          const payload = {
            quiz_answers,
            top_n: 9
          };
          if (user) payload.user_id = user.user_id;

          const data = await apiPost("/recommend/quiz", payload);
          renderResults(data.recommendations || []);
          setStatus(requestStatus, "Recommendations loaded.", "success");
          return;
        }

        const games = parseGamesInput(gameInput.value);
        if (games.length === 0) throw new Error("Enter at least one game name.");

        const merged = [];
        const seen = new Set();

        for (const game of games) {
          const payload = { game, top_n: 10 };
          if (user) payload.user_id = user.user_id;
          if (mode === "hybrid") payload.quiz_answers = quiz_answers;

          const data = await apiPost("/recommend/game", payload);
          const recs = data.recommendations || [];
          for (const r of recs) {
            const key = String(r.AppID ?? r.appid ?? r.Name ?? Math.random());
            if (seen.has(key)) continue;
            seen.add(key);
            merged.push(r);
          }
        }

        // Sort merged games by hybrid_score if available, otherwise fallback.
        merged.sort((a, b) => {
          const ha = safeNumber(a.hybrid_score) ?? 0;
          const hb = safeNumber(b.hybrid_score) ?? 0;
          return hb - ha;
        });

        renderResults(merged.slice(0, 20));
        setStatus(requestStatus, "Recommendations loaded.", "success");
      } catch (err) {
        renderResults([]);
        setStatus(requestStatus, err.message || "Failed to fetch recommendations.", "error");
      }
    }

    document.getElementById("loginBtn").addEventListener("click", () => handleAuth("login"));
    document.getElementById("registerBtn").addEventListener("click", () => handleAuth("register"));
    document.getElementById("submitBtn").addEventListener("click", submitRecommendations);
    document.querySelectorAll('input[name="mode"]').forEach((radio) => {
      radio.addEventListener("change", (e) => applyModeClass(e.target.value));
    });
    logoutBtn.addEventListener("click", () => {
      clearLoggedInUser();
      setStatus(authStatus, "Logged out.");
    });

    buildQuizUI();
    refreshAuthUI();
    applyModeClass(selectedMode());
  </script>
</body>
</html>
